name: my_store
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/app_icon.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icons/play_store_512.png"

flutter_screenutil: ^5.9.3
very_good_analysis: ^10.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter: null

uses-material-design: true
# To add assets to your application, add an assets section, like this:
assets:
  - .env.dev
  - .env.prod
  - assets/images/core/

# An image asset can refer to one or more resolution-specific "variants", see
fonts:
  - family: Cairo
    fonts:
      - asset: assets\fonts\arabic\cairo\Cairo-Bold.ttf
        weight: 700
      - asset: assets\fonts\arabic\cairo\Cairo-Medium.ttf
        weight: 500
      - asset: assets\fonts\arabic\cairo\Cairo-Regular.ttf
        weight: 400

  - family: Poppins
    fonts:
      - asset: assets\fonts\english\poppins\Poppins-Bold.ttf
        weight: 700
      - asset: assets\fonts\english\poppins\Poppins-Medium.ttf
        weight: 500
      - asset : assets\fonts\english\poppins\Poppins-Regular.ttf
        weight: 400 
#
# For details regarding fonts from package dependencies,
# see https://flutter.dev/to/font-from-package
