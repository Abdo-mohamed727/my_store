name: my_store
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  animate_do: ^4.2.0

  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  flutter:

    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.3
  freezed_annotation: ^3.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/app_icon.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icons/play_store_512.png"

dev_dependencies:
  build_runner: ^2.12.2
  flutter_bloc: ^9.1.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  get_it: ^9.2.1
  shared_preferences: ^2.5.4
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.dev
    - .env.prod
    - assets/images/core/
    - lang/ar.json
    - lang/en.json
    - assets/svg/
    - assets/images/admin/
    - assets/images/customer/
    - assets/images/icons/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/arabic/cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/arabic/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/arabic/cairo/Cairo-Regular.ttf
          weight: 400

    - family: Poppins
      fonts:
        - asset: assets/fonts/english/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/english/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/english/poppins/Poppins-Regular.ttf
          weight: 400

#
# For details regarding fonts from package dependencies,
# see https://flutter.dev/to/font-from-package
